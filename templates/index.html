<!DOCTYPE html>
<html>
<head>
    <title>Fake Job Detection</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 10px;
            width: 50%;
            margin: auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        textarea {
            width: 90%;
            height: 150px;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            margin-top: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🧠 Fake Job Detection System</h1>
        <p>Enter job description below:</p>

        <form action="/predict" method="post">
            <textarea name="text" placeholder="Paste job description here..."></textarea><br>
            <button type="submit">Predict</button>
        </form>

        {% if prediction %}
        <div class="result">
            {{ prediction }}
        </div>
        {% endif %}
    </div>

</body>
</html>
